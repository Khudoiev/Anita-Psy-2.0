name: Deploy to Staging Server

# Срабатывает при push в staging ветку
# Локальный staging — запускай вручную: ./scripts/deploy-staging.sh
# Серверный staging — этот workflow деплоит автоматически через SSH

on:
  push:
    branches: [staging]

jobs:
  # ─── 1. Проверка синтаксиса ────────────────────────────────────────────────
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Check syntax
        run: node --check server.js
        working-directory: backend

  # ─── 2. Деплой на серверный staging ───────────────────────────────────────
  deploy-server:
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key:      ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd ~/anita-psy-staging
            ./scripts/deploy-staging-server.sh

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=🧪 Staging сервер обновлён! Тестируй: https://staging.anita-psy.online"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=❌ Staging деплой упал! Проверь GitHub Actions"
