name: Staging — Build Check

# Срабатывает при push в staging ветку
# Staging деплоится ЛОКАЛЬНО командой: ./scripts/deploy-staging.sh
# Эта задача только проверяет что код собирается без ошибок

on:
  push:
    branches: [staging]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Check syntax (no build errors)
        run: node --check server.js
        working-directory: backend

      - name: Notify ready for local testing
        if: success()
        run: |
          if [ -n "${{ secrets.TG_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "text=🧪 Staging ветка обновлена! Запусти локально: ./scripts/deploy-staging.sh"
          fi
