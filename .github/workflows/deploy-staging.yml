name: Deploy to Staging Server

# Срабатывает при push в staging ветку
# Локальный staging — запускай вручную: ./scripts/deploy-staging.sh
# Серверный staging — этот workflow деплоит автоматически через SSH

on:
  push:
    branches: [staging]

jobs:
  # ─── 1. Проверка синтаксиса ────────────────────────────────────────────────
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Check syntax
        run: node --check server.js
        working-directory: backend

  # ─── 2. Деплой на серверный staging ───────────────────────────────────────
  deploy-server:
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key:      ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /home/aleks90715/anita-psy-staging
            git pull origin staging
            # Пул нового образа (уже запушенного build.yml)
            docker pull ghcr.io/khudoiev/anita-psy-2.0-backend:staging-latest
            # Перезапуск контейнеров
            docker-compose -f infra/docker-compose.staging-server.yml --env-file .env.staging.server up -d --build
            # Ждем готовности бэкенда перед миграциями (до 30 секунд)
            echo "Waiting for backend to be ready..."
            for i in {1..30}; do
              if [ "$(docker inspect -f '{{.State.Running}}' anita-backend-staging-srv)" == "true" ]; then
                echo "Backend is running, executing migrations..."
                docker exec anita-db-staging-srv psql -U anita_staging -d anita_staging \
                  -c "UPDATE pgmigrations SET name='1714051200001_fix_users_schema' WHERE name='1714051200001_performance_indexes';"
                docker exec anita-backend-staging-srv npm run migrate:up
                break
              fi
              echo "Waiting..."
              sleep 1
            done
            docker image prune -f

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=🧪 Staging сервер обновлён! Тестируй: https://staging.anita-psy.online"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=❌ Staging деплой упал! Проверь GitHub Actions"
