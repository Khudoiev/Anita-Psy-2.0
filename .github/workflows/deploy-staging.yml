name: Deploy to Staging Server

on:
  push:
    branches: [staging]

jobs:
  deploy-server:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key:      ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /home/aleks90715/anita-psy-staging
            git fetch origin staging
            git reset --hard origin/staging
            git clean -fd
            docker-compose -f infra/docker-compose.staging-server.yml --env-file .env.staging.server up -d --build
            echo "Waiting for backend..."
            timeout 60 bash -c 'until wget -qO- http://localhost:4001/api/health &>/dev/null; do sleep 2; done'
            docker exec anita-backend-staging-srv npm run migrate:up
            docker system prune -f

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=🧪 Staging обновлён! Тестируй: https://staging.anita-psy.online"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=❌ Staging деплой упал! Проверь GitHub Actions"
