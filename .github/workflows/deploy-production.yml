name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key:      ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /home/aleks90715/Anita Production 2.1
            git checkout main
            ./deploy.sh

      - name: Notify success
        if: success()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=✅ Production обновлён! https://anita-psy.online"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=❌ Production деплой упал! Проверь GitHub Actions"
