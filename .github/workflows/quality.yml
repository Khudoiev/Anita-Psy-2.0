name: Code Quality

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  lint:
    name: ESLint — статический анализ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: cd backend && npm ci

      - name: Run ESLint
        run: cd backend && npm run lint

  contract:
    name: Contract тесты — фронт ↔ бэк API
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       anita
          POSTGRES_USER:     anita
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: cd backend && npm ci

      - name: Apply migrations
        run: cd backend && npm run migrate:up
        env:
          DATABASE_URL:      postgresql://anita:test_password@localhost:5432/anita
          DB_ENCRYPTION_KEY: ci-test-encryption-key-32-chars-!!

      - name: Run contract tests
        run: cd backend && npm run test:contract
        env:
          DATABASE_URL:      postgresql://anita:test_password@localhost:5432/anita
          JWT_SECRET:        ci-test-jwt-secret
          DB_ENCRYPTION_KEY: ci-test-encryption-key-32-chars-!!
          NODE_ENV:          test

  security:
    name: Security тесты
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       anita
          POSTGRES_USER:     anita
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: cd backend && npm ci

      - name: Apply migrations
        run: cd backend && npm run migrate:up
        env:
          DATABASE_URL:      postgresql://anita:test_password@localhost:5432/anita
          DB_ENCRYPTION_KEY: ci-test-encryption-key-32-chars-!!

      - name: Run security tests
        run: cd backend && npm run test:security
        env:
          DATABASE_URL:      postgresql://anita:test_password@localhost:5432/anita
          JWT_SECRET:        ci-test-jwt-secret
          DB_ENCRYPTION_KEY: ci-test-encryption-key-32-chars-!!
          NODE_ENV:          test
