name: CI — Tests

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: anita
          POSTGRES_PASSWORD: anita_test_secret
          POSTGRES_DB: anita_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://anita:anita_test_secret@localhost:5432/anita_test
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      NODE_ENV: test
      DAILY_MESSAGE_LIMIT: 100
      GROK_API_KEY: test-key-not-real
      DB_ENCRYPTION_KEY: ci-test-encryption-key-32-chars-!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run database migrations
        run: npm run migrate:up
        working-directory: backend

      - name: Run tests
        run: npm run test:ci
        working-directory: backend
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
