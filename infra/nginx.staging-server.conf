# nginx.staging-server.conf
# Staging на сервере: HTTP-only (без SSL — используется raw IP)
# Фронт (чат): http://34.140.213.8:8081
# Админка:     http://34.140.213.8:8082

# ─── Фронт клиентов (чат) ────────────────────────────────────────────────────
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;

  access_log /var/log/nginx/frontend-access.log;
  error_log  /var/log/nginx/frontend-error.log warn;

  location /api/ {
    proxy_pass http://backend:4001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

# ─── Админка ─────────────────────────────────────────────────────────────────
server {
  listen 8082;
  server_name _;

  root /usr/share/nginx/html/admin;
  index index.html;
  absolute_redirect off;

  access_log /var/log/nginx/admin-access.log;
  error_log  /var/log/nginx/admin-error.log warn;

  location /api/ {
    proxy_pass http://backend:4001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
