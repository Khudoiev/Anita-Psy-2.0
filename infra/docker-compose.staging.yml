# docker-compose.staging.yml
# На staging сервере: docker-compose -f docker-compose.staging.yml up -d
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anita-db-staging
    environment:
      POSTGRES_DB: anita_staging
      POSTGRES_USER: anita_staging
      POSTGRES_PASSWORD: ${DB_PASSWORD_STAGING}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anita_staging"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: anita-backend-staging
    environment:
      DATABASE_URL: postgresql://anita_staging:${DB_PASSWORD_STAGING}@postgres:5432/anita_staging
      JWT_SECRET: ${JWT_SECRET_STAGING}
      GROK_API_KEY: ${GROK_API_KEY}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY_STAGING}
      PORT: 4001  # Отличается от prod (4000)
      NODE_ENV: staging
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: anita-frontend-staging
    environment:
      FRONTEND_URL: https://staging.anita-psy.com
    ports:
      - "8080:80"  # Отличается от prod (80)
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data_staging:
