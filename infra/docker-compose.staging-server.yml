# docker-compose.staging-server.yml
# Серверный staging (VPS): два окружения на одном сервере, разные порты
# Фронт (чат): http://34.140.213.8:8081
# Админка:     http://34.140.213.8:8082
# Запуск: docker-compose -f infra/docker-compose.staging-server.yml --env-file .env.staging.server up -d --build
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anita-db-staging-srv
    environment:
      POSTGRES_DB: anita_staging
      POSTGRES_USER: anita_staging
      POSTGRES_PASSWORD: ${DB_PASSWORD_STAGING}
    volumes:
      - postgres_data_staging_srv:/var/lib/postgresql/data
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anita_staging"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: anita-backend-staging-srv
    environment:
      DATABASE_URL: postgresql://anita_staging:${DB_PASSWORD_STAGING}@postgres:5432/anita_staging
      JWT_SECRET: ${JWT_SECRET_STAGING}
      GROK_API_KEY: ${GROK_API_KEY}
      GROK_MODEL: ${GROK_MODEL:-grok-4-1-fast-reasoning}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY_STAGING}
      PORT: "4001"
      NODE_ENV: staging
      FRONTEND_URL: "http://34.140.213.8:8081"
      DAILY_MESSAGE_LIMIT: ${DAILY_MESSAGE_LIMIT:-50}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.staging-server
    container_name: anita-frontend-staging-srv
    ports:
      - "8081:80"    # фронт (чат клиентов)
      - "8082:8082"  # админка
    depends_on:
      - backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_staging_srv:
