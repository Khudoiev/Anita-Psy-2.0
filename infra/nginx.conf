# nginx.conf — production
# Фронт (чат): https://anita-psy.online      (порт 443)
# Админка:     https://anita-psy.online:8443  (порт 8443)

server {
  listen 80;
  server_name anita-psy.online www.anita-psy.online;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── Фронт клиентов (чат) ────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name anita-psy.online www.anita-psy.online;

  ssl_certificate /etc/letsencrypt/live/anita-psy.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/anita-psy.online/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;

  location /api/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

# ─── Админка ─────────────────────────────────────────────────────────────────
server {
  listen 8443 ssl http2;
  server_name anita-psy.online www.anita-psy.online;

  ssl_certificate /etc/letsencrypt/live/anita-psy.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/anita-psy.online/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;

  location /api/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
