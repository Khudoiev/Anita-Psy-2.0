version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anita-db
    env_file: .env
    environment:
      POSTGRES_DB: anita
      POSTGRES_USER: anita
      POSTGRES_PASSWORD: ${DB_PASSWORD:-anita_secret}
    volumes:
      - anitapsy_postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anita"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: anita-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://anita:${DB_PASSWORD:-anita_secret}@postgres:5432/anita
      PORT: 4000
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: anita-frontend
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    depends_on:
      - backend
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: always

volumes:
  anitapsy_postgres_data:
    external: true
