<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Anita — AI Психолог. Безопасное пространство для разговора о том, что тебя беспокоит.">
  <meta name="theme-color" content="#0e1a2e">
  <title>Anita · AI Психолог</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="index.css">
  <script>
    function isTokenValid(token) {
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.exp * 1000 > Date.now() + 60000;
      } catch { return false; }
    }
    const jwt = localStorage.getItem('anita_jwt');
    if (!jwt || !isTokenValid(jwt)) {
      localStorage.removeItem('anita_jwt');
      const invite = new URLSearchParams(window.location.search).get('invite');
      window.location.href = invite ? `/auth.html?invite=${invite}` : '/auth.html';
    }

    // Failsafe: Remove splash screen after 6 seconds even if JS fails
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if (splash && !splash.classList.contains('done')) {
        console.warn('Splash failsafe triggered');
        splash.classList.add('done');
        const layout = document.getElementById('app-layout');
        if (layout) layout.classList.add('visible');
      }
    }, 6000);
  </script>
</head>
<body>

  <!-- Ambient glow -->
  <div class="ambient"></div>

  <!-- ===== SPLASH ===== -->
  <div class="splash" id="splash">
    <img src="icon.svg" alt="Anita" class="splash-icon">
    <div class="splash-title">Anita</div>
    <div class="splash-divider"></div>
    <div class="splash-tagline">Твоя поддержка</div>
  </div>

  <!-- ===== APP LAYOUT ===== -->
  <div class="app-layout" id="app-layout">

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <img src="icon.svg" alt="Anita" class="sidebar-logo">
          <span class="sidebar-brand-name">Anita</span>
        </div>
        <button class="sidebar-close" id="sidebar-close" aria-label="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <button class="sidebar-new-btn" id="new-chat-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Новый разговор
      </button>

      <div class="sidebar-chats" id="sidebar-chats">
        <div class="sidebar-section-title">Разговоры</div>
        <!-- Chat items injected by JS -->
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-profile" id="sidebar-profile">
          <div class="sidebar-profile-avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="sidebar-profile-info">
            <div class="sidebar-profile-name" id="profile-name">Гость</div>
            <div class="sidebar-auth-links" id="sidebar-auth-links">
              <a href="/auth.html" class="auth-link">Войти или Зарегистрироваться</a>
            </div>
            <div class="sidebar-profile-sessions" id="profile-sessions" style="display:none;">0 сессий</div>
          </div>
          <button class="sidebar-settings-btn" id="settings-btn" aria-label="Настройки">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN PANEL -->
    <main class="main-panel" id="main-panel">

      <!-- WELCOME SCREEN -->
      <div class="welcome" id="welcome-screen">
        <div class="welcome-particles">
          <div class="particle"></div><div class="particle"></div>
          <div class="particle"></div><div class="particle"></div>
          <div class="particle"></div><div class="particle"></div>
          <div class="particle"></div><div class="particle"></div>
        </div>
        <div class="welcome-ocean">
          <div class="welcome-wave"></div>
          <div class="welcome-wave"></div>
          <div class="welcome-wave"></div>
        </div>
        <div class="welcome-content">
          <img src="icon.svg" alt="Anita" class="welcome-icon">
          <div class="welcome-brand">Anita</div>
          <div class="welcome-subtitle">AI Психолог · Твоя поддержка</div>
          <div class="welcome-quote" id="welcome-quote"></div>
          <button class="welcome-start-btn" id="welcome-start-btn">Начать разговор</button>
          <div class="welcome-recent" id="welcome-recent" style="display:none;">
            <div class="welcome-recent-title">Недавние разговоры</div>
            <div class="welcome-recent-list" id="welcome-recent-list"></div>
          </div>
        </div>
      </div>

      <!-- CHAT VIEW (hidden by default, shown when chat active) -->
      <div class="chat-view" id="chat-view" style="display:none;flex-direction:column;height:100%;">
        <header class="chat-header" id="chat-header">
          <button class="menu-btn" id="menu-btn" aria-label="Меню">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <img src="icon.svg" alt="Anita" class="header-avatar">
          <div class="header-info">
            <div class="header-name">Anita</div>
            <div class="header-status">
              <span class="status-dot"></span>
              <span id="header-status-text">AI Психолог · Онлайн</span>
              <span class="session-progress" id="session-progress" style="display:none;">
                <span class="progress-dot"></span>
                Ход <span id="turn-count">1</span>/25
              </span>
            </div>
          </div>
        </header>

        <div class="chat-area" id="chat-area"></div>

        <div class="disclaimer">Anita — не замена живому специалисту. Если вы в кризисе — обратитесь за помощью.</div>

        <div class="input-area">
          <div class="input-wrap">
            <textarea id="msg-input" placeholder="Напишите сообщение..." rows="1" autocomplete="off"></textarea>
          </div>
          <button class="stop-btn" id="stop-btn" style="display:none" aria-label="Остановить">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </button>
          <button class="send-btn" id="send-btn" aria-label="Отправить">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== SETTINGS MODAL ===== -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-title">Настройки</div>
      <div class="modal-field">
        <label class="modal-label">Ваше имя (необязательно)</label>
        <input class="modal-input" id="user-name-input" type="text" placeholder="Как к вам обращаться?">
      </div>
      <div class="modal-field toggle-field">
        <label class="modal-label">Показывать прогресс сессии</label>
        <label class="switch">
          <input type="checkbox" id="show-progress-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="modal-cancel">Отмена</button>
        <button class="modal-btn primary" id="modal-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=2.2"></script>
</body>
</html>
